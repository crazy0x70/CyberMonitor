<svg width='1200' height='950' viewBox='0 0 1200 950' xmlns='http://www.w3.org/2000/svg'>
  <defs>
    <pattern id='grid' width='20' height='20' patternUnits='userSpaceOnUse'>
      <path d='M 20 0 L 0 0 0 20' fill='none' stroke='#EDF2F7' stroke-width='1'/>
    </pattern>
    <marker id='arrow' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto'>
      <polygon points='0 0, 10 3.5, 0 7' fill='#4A5568' />
    </marker>
    <filter id='shadow' x='-2%' y='-2%' width='104%' height='104%'>
      <feGaussianBlur in='SourceAlpha' stdDeviation='2' />
      <feOffset dx='1' dy='1' result='offsetblur' />
      <feComponentTransfer><feFuncA type='linear' slope='0.2'/></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in='SourceGraphic' /></feMerge>
    </filter>
  </defs>
  <rect width='100%' height='100%' fill='#FFFFFF' />
  <rect width='100%' height='100%' fill='url(#grid)' />
  
  <text x='600' y='40' font-family='PingFang SC, sans-serif' font-size='24' font-weight='bold' text-anchor='middle' fill='#1A202C'>CyberMonitor 前后端分离 / 双入口部署架构</text>

  <!-- ================= 静态托管 / 访客端 ================= -->
  <g transform='translate(50, 80)'>
    <rect width='280' height='140' rx='8' fill='#FFF5F7' stroke='#D53F8C' stroke-width='2' stroke-dasharray='5,3' filter='url(#shadow)' />
    <text x='140' y='30' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#97266D'>静态前端隔离 (CDN)</text>
    <text x='20' y='55' font-family='PingFang SC' font-size='11' fill='#B83280'>• Cloudflare Pages / Vercel 托管</text>
    <text x='20' y='75' font-family='PingFang SC' font-size='11' fill='#B83280'>• 访客首先拉取 config.json</text>
    <text x='20' y='95' font-family='PingFang SC' font-size='11' fill='#B83280'>• 聚合多个后端 apiURL/socket</text>
    <text x='20' y='115' font-family='PingFang SC' font-size='11' fill='#B83280'>• 隐藏服务端真实 IP</text>
  </g>

  <!-- ================= 浏览器入口 ================= -->
  <g transform='translate(50, 260)'>
    <rect width='280' height='100' rx='8' fill='#FFF5F5' stroke='#E53E3E' stroke-width='2' filter='url(#shadow)' />
    <text x='140' y='30' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#9B2C2C'>管理访问 (Admin)</text>
    <text x='140' y='60' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#C53030'>仅通过端口 25012 访问</text>
    <text x='140' y='80' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#C53030'>受 VPN / 内网保护层逻辑隔离</text>
  </g>

  <!-- ================= 服务端进程 (Server) ================= -->
  <g transform='translate(420, 80)'>
    <rect width='360' height='700' rx='10' fill='#F0FFF4' stroke='#38A169' stroke-width='3' filter='url(#shadow)' />
    <text x='180' y='35' font-family='PingFang SC' font-size='20' font-weight='bold' text-anchor='middle' fill='#22543D'>双入口模式 Server</text>
    
    <!-- 接入点 -->
    <g transform='translate(20, 60)'>
      <rect width='320' height='80' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='2' />
      <text x='160' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>Admin Entry (端口 25012)</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='11' fill='#22543D'>• 承载管理 API、管理 WS</text>
      <text x='10' y='65' font-family='PingFang SC' font-size='11' fill='#22543D'>• 路由: {AdminPath}, /api/v1/admin/*</text>
    </g>

    <g transform='translate(20, 160)'>
      <rect width='320' height='100' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='2' />
      <text x='160' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>Public Entry (端口 25013)</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='11' fill='#22543D'>• 公开展示页、config.json</text>
      <text x='10' y='65' font-family='PingFang SC' font-size='11' fill='#22543D'>• 只读快照 API、公开 WS</text>
      <text x='10' y='82' font-family='PingFang SC' font-size='11' fill='#22543D'>• Agent gRPC &amp; Ingest 接入点</text>
    </g>

    <!-- 内部模块简化版 -->
    <rect x='20' y='280' width='320' height='380' rx='4' fill='none' stroke='#48BB78' stroke-width='1' stroke-dasharray='4,2' />
    <text x='180' y='305' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>内部核心逻辑组件</text>
    <text x='180' y='330' font-family='PingFang SC' font-size='11' text-anchor='middle' fill='#22543D'>(Store, Hub, Alert, AI, Updater)</text>
    <line x1='40' y1='350' x2='320' y2='350' stroke='#C6F6D5' />
    <text x='180' y='380' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#22543D'>管理逻辑与数据聚合</text>
  </g>

  <!-- ================= 探针端 (Agent) ================= -->
  <g transform='translate(880, 160)'>
    <rect width='280' height='120' rx='8' fill='#EBF8FF' stroke='#3182CE' stroke-width='2' filter='url(#shadow)' />
    <text x='140' y='30' font-family='PingFang SC' font-size='18' font-weight='bold' text-anchor='middle' fill='#2B6CB0'>Agent 集群</text>
    <text x='140' y='60' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2C5282'>仅连接 Public Entry (25013)</text>
    <text x='140' y='80' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2C5282' font-weight='bold'>不访问管理入口 25012</text>
    <text x='140' y='100' font-family='PingFang SC' font-size='11' text-anchor='middle' fill='#4A5568'>gRPC 优先 / HTTP 回退</text>
  </g>

  <!-- ================= 说明框 (Info Boxes) ================= -->
  <g transform='translate(880, 320)'>
    <rect width='280' height='560' rx='8' fill='#F7FAFC' stroke='#A0AEC0' stroke-width='1.5' stroke-dasharray='4,4' />
    
    <g transform='translate(10, 20)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【部署核心差异】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 当 PublicAddr 非空时触发双监听</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 端口分离: 25012(Admin) / 25013(Public)</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• Agent 强制要求连接公共入口</text>
    </g>

    <g transform='translate(10, 110)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【认证与权限边界】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 管理员登录: POST /api/v1/login</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 会话 Cookie: cm_admin_session</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 公开接口允许跨域 (CORS)</text>
      <text x='5' y='86' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 公开 WebSocket 禁止携带 Token</text>
    </g>

    <g transform='translate(10, 220)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【前台静态分离场景】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 前端优先解析站内 config.json</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 支持动态切换后端节点地址</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 完美适配对象存储/CDN 托管</text>
    </g>

    <g transform='translate(10, 320)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【持续兼容性】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 旧 Agent 仍然可以通过 HTTP 接入</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• Server 自动识别 Agent 能力头</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 实现渐进式平滑升级</text>
    </g>

    <g transform='translate(10, 420)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【持久化层】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• state.json (状态镜像)</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• test_history.json (探测数据)</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• ./data 目录完全自包含</text>
    </g>
  </g>

  <!-- ================= 连线 (Connections) ================= -->
  <!-- Browser Static to Server Public -->
  <path d='M 330 150 L 420 150 L 420 180' fill='none' stroke='#D53F8C' stroke-width='1.5' marker-end='url(#arrow)' />
  <text x='375' y='145' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#97266D'>apiURL Request</text>

  <!-- Admin Browser to Server Admin -->
  <path d='M 330 310 L 420 310' fill='none' stroke='#E53E3E' stroke-width='2' marker-end='url(#arrow)' />
  <text x='375' y='300' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#9B2C2C'>Private API</text>

  <!-- Agent to Public Entry -->
  <path d='M 880 220 L 740 220' fill='none' stroke='#3182CE' stroke-width='2' marker-end='url(#arrow)' />
  <text x='810' y='210' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#2B6CB0'>gRPC / HTTP</text>

</svg>