<svg width='1200' height='950' viewBox='0 0 1200 950' xmlns='http://www.w3.org/2000/svg'>
  <defs>
    <pattern id='grid' width='20' height='20' patternUnits='userSpaceOnUse'>
      <path d='M 20 0 L 0 0 0 20' fill='none' stroke='#EDF2F7' stroke-width='1'/>
    </pattern>
    <marker id='arrow' markerWidth='10' markerHeight='7' refX='9' refY='3.5' orient='auto'>
      <polygon points='0 0, 10 3.5, 0 7' fill='#4A5568' />
    </marker>
    <filter id='shadow' x='-2%' y='-2%' width='104%' height='104%'>
      <feGaussianBlur in='SourceAlpha' stdDeviation='2' />
      <feOffset dx='1' dy='1' result='offsetblur' />
      <feComponentTransfer><feFuncA type='linear' slope='0.2'/></feComponentTransfer>
      <feMerge><feMergeNode /><feMergeNode in='SourceGraphic' /></feMerge>
    </filter>
  </defs>
  
  <rect width='100%' height='100%' fill='#FFFFFF' />
  <rect width='100%' height='100%' fill='url(#grid)' />
  
  <text x='600' y='40' font-family='PingFang SC, sans-serif' font-size='24' font-weight='bold' text-anchor='middle' fill='#1A202C'>CyberMonitor 默认一体部署运行架构</text>

  <!-- ================= 浏览器端 (Browsers) ================= -->
  <g transform='translate(50, 80)'>
    <rect width='260' height='120' rx='8' fill='#FFF5F5' stroke='#E53E3E' stroke-width='2' filter='url(#shadow)' />
    <text x='130' y='30' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#9B2C2C'>浏览器 (公开展示页)</text>
    <text x='20' y='55' font-family='PingFang SC' font-size='12' fill='#C53030'>• 访问首页: /</text>
    <text x='20' y='75' font-family='PingFang SC' font-size='12' fill='#C53030'>• 读取 config.json (apiURL/socket)</text>
    <text x='20' y='95' font-family='PingFang SC' font-size='12' fill='#C53030'>• ECharts 渲染 + WS 实时同步</text>
  </g>

  <g transform='translate(50, 220)'>
    <rect width='260' height='120' rx='8' fill='#FFF5F5' stroke='#E53E3E' stroke-width='2' filter='url(#shadow)' />
    <text x='130' y='30' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#9B2C2C'>浏览器 (管理后台)</text>
    <text x='20' y='55' font-family='PingFang SC' font-size='12' fill='#C53030'>• 访问路径: {AdminPath}</text>
    <text x='20' y='75' font-family='PingFang SC' font-size='12' fill='#C53030'>• 认证: JWT Cookie (cm_admin_session)</text>
    <text x='20' y='95' font-family='PingFang SC' font-size='12' fill='#C53030'>• 管理 API 调用 + 管理 WS</text>
  </g>

  <!-- ================= 服务端 (Server) ================= -->
  <g transform='translate(400, 80)'>
    <rect width='400' height='680' rx='10' fill='#F0FFF4' stroke='#38A169' stroke-width='3' filter='url(#shadow)' />
    <text x='200' y='35' font-family='PingFang SC' font-size='20' font-weight='bold' text-anchor='middle' fill='#22543D'>CyberMonitor Server 核心进程</text>
    
    <!-- 子模块 -->
    <g transform='translate(20, 60)'>
      <rect width='360' height='80' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>Public HTTP Mux (端口 25012)</text>
      <text x='10' y='45' font-family='PingFang SC' font-size='11' fill='#22543D'>静态资源 / config.json / 公开快照 API / 路由: /</text>
      <text x='10' y='65' font-family='PingFang SC' font-size='11' fill='#22543D'>Agent HTTP 回退接口: /api/v1/ingest, /api/v1/agent/*</text>
    </g>

    <g transform='translate(20, 150)'>
      <rect width='360' height='40' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>gRPC Ingress (h2c / HTTP2)</text>
    </g>

    <g transform='translate(20, 200)'>
      <rect width='360' height='60' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>Admin HTTP Mux (端口 25012)</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='11' fill='#22543D'>管理 API (鉴权) / 动态路径: {AdminPath}</text>
    </g>

    <g transform='translate(20, 270)'>
      <rect width='360' height='50' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='30' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>Hub / 实时广播中心 (WebSocket)</text>
    </g>

    <g transform='translate(20, 330)'>
      <rect width='360' height='100' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>核心状态存储 (Store - 内存)</text>
      <text x='10' y='45' font-family='PingFang SC' font-size='11' fill='#22543D'>• 节点状态 (nodes) &amp; 探测历史 (testHistory)</text>
      <text x='10' y='62' font-family='PingFang SC' font-size='11' fill='#22543D'>• 节点资料 (profiles) &amp; 站点设置 (settings)</text>
      <text x='10' y='79' font-family='PingFang SC' font-size='11' fill='#22543D'>• 登录计数 &amp; 告警锁定状态 (alerted)</text>
    </g>

    <g transform='translate(20, 440)'>
      <rect width='360' height='60' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>AI 上下文构建器 &amp; 适配器</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='11' fill='#22543D'>数据清洗 -> 趋势整理 -> 调用 OpenAI/Gemini/豆包等</text>
    </g>

    <g transform='translate(20, 510)'>
      <rect width='360' height='60' rx='4' fill='#C6F6D5' stroke='#48BB78' stroke-width='1.5' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>系统更新管理器 (Updater)</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='11' fill='#22543D'>版本检查 / 二进制替换 / docker.sock 编排</text>
    </g>

    <g transform='translate(20, 580)'>
      <rect width='360' height='80' rx='4' fill='#F0FFF4' stroke='#38A169' stroke-width='1' stroke-dasharray='4,2' />
      <text x='180' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#22543D'>外部集成层</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='11' fill='#22543D'>告警分发: Feishu Webhook, Telegram Bot API</text>
      <text x='10' y='65' font-family='PingFang SC' font-size='11' fill='#22543D'>认证辅助: Cloudflare Turnstile Verify</text>
    </g>
  </g>

  <!-- ================= 探针端 (Agent) ================= -->
  <g transform='translate(880, 80)'>
    <rect width='280' height='400' rx='8' fill='#EBF8FF' stroke='#3182CE' stroke-width='2' filter='url(#shadow)' />
    <text x='140' y='30' font-family='PingFang SC' font-size='18' font-weight='bold' text-anchor='middle' fill='#2B6CB0'>CyberMonitor Agent</text>
    
    <g transform='translate(15, 50)'>
      <rect width='250' height='120' rx='4' fill='#BEE3F8' stroke='#4299E1' />
      <text x='125' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#2C5282'>采集与探测引擎</text>
      <text x='10' y='50' font-family='PingFang SC' font-size='11' fill='#2C5282'>指标: CPU, 内存, 磁盘(IO), 网络(流量)</text>
      <text x='10' y='70' font-family='PingFang SC' font-size='11' fill='#2C5282'>探测: TCP 端口, ICMP 延时/丢包</text>
      <text x='10' y='90' font-family='PingFang SC' font-size='11' fill='#2C5282'>状态: 进程数, 连接数, Uptime</text>
      <text x='10' y='110' font-family='PingFang SC' font-size='11' fill='#2C5282'>更新: 获取远程配置 / 执行升级</text>
    </g>

    <g transform='translate(15, 185)'>
      <rect width='250' height='80' rx='4' fill='#BEE3F8' stroke='#4299E1' />
      <text x='125' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#2C5282'>gRPC 控制面 (优先)</text>
      <text x='10' y='50' font-family='PingFang SC' font-size='10' fill='#2C5282'>• Register / GetConfig / ReportStats</text>
      <text x='10' y='68' font-family='PingFang SC' font-size='10' fill='#2C5282'>• cyber_monitor.agentrpc.AgentService</text>
    </g>

    <g transform='translate(15, 280)'>
      <rect width='250' height='60' rx='4' fill='#EDF2F7' stroke='#A0AEC0' />
      <text x='125' y='25' font-family='PingFang SC' font-size='14' font-weight='bold' text-anchor='middle' fill='#4A5568'>HTTP Fallback (回退)</text>
      <text x='10' y='48' font-family='PingFang SC' font-size='10' fill='#4A5568'>POST /api/v1/ingest (gRPC 不可用时)</text>
    </g>

    <g transform='translate(15, 350)'>
      <rect width='250' height='40' rx='4' fill='#F7FAFC' stroke='#CBD5E0' />
      <text x='125' y='25' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#4A5568'>本地凭据 (node_id / token)</text>
    </g>
  </g>

  <!-- ================= 外部服务 (External) ================= -->
  <g transform='translate(880, 520)'>
    <rect width='280' height='380' rx='8' fill='#F7FAFC' stroke='#A0AEC0' stroke-width='2' filter='url(#shadow)' />
    <text x='140' y='30' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#4A5568'>外部依赖与集成</text>
    
    <rect x='20' y='50' width='240' height='40' rx='4' fill='#FFFFFF' stroke='#CBD5E0' />
    <text x='140' y='75' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2D3748'>GitHub (更新源/校验文件)</text>
    
    <rect x='20' y='100' width='240' height='40' rx='4' fill='#FFFFFF' stroke='#CBD5E0' />
    <text x='140' y='125' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2D3748'>Docker Engine (docker.sock)</text>
    
    <rect x='20' y='150' width='240' height='40' rx='4' fill='#FFFFFF' stroke='#CBD5E0' />
    <text x='140' y='175' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2D3748'>Telegram Bot API / Bot 交互</text>
    
    <rect x='20' y='200' width='240' height='40' rx='4' fill='#FFFFFF' stroke='#CBD5E0' />
    <text x='140' y='225' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2D3748'>Feishu Webhook 告警</text>
    
    <rect x='20' y='250' width='240' height='40' rx='4' fill='#FFFFFF' stroke='#CBD5E0' />
    <text x='140' y='275' font-family='PingFang SC' font-size='12' text-anchor='middle' fill='#2D3748'>Cloudflare Turnstile (人机验证)</text>
    
    <rect x='20' y='300' width='240' height='60' rx='4' fill='#FFFFFF' stroke='#CBD5E0' />
    <text x='140' y='320' font-family='PingFang SC' font-size='12' font-weight='bold' text-anchor='middle' fill='#2D3748'>AI Providers</text>
    <text x='140' y='345' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#718096'>OpenAI, Gemini, 豆包, OpenAI-Compatible</text>
  </g>

  <!-- ================= 持久化文件 (Persistence) ================= -->
  <g transform='translate(400, 780)'>
    <rect width='400' height='120' rx='8' fill='#F7FAFC' stroke='#718096' stroke-width='2' filter='url(#shadow)' />
    <text x='200' y='25' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#2D3748'>持久化层 (数据目录: ./data)</text>
    <text x='20' y='50' font-family='PingFang SC' font-size='11' fill='#4A5568'>• state.json: 包含 settings, profiles, nodes 镜像</text>
    <text x='20' y='67' font-family='PingFang SC' font-size='11' fill='#4A5568'>• test_history.json: 历史时序探测结果曲线</text>
    <text x='20' y='84' font-family='PingFang SC' font-size='11' fill='#4A5568'>• server.log / report.log: 运行时与操作日志</text>
  </g>

  <!-- ================= 右侧说明框 (Info Boxes) ================= -->
  <g transform='translate(50, 400)'>
    <rect width='280' height='500' rx='8' fill='#F7FAFC' stroke='#A0AEC0' stroke-width='1.5' stroke-dasharray='4,4' />
    <text x='140' y='30' font-family='PingFang SC' font-size='16' font-weight='bold' text-anchor='middle' fill='#4A5568'>系统运行核心说明</text>
    
    <g transform='translate(10, 50)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【协议与端口】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 一体部署监听端口: 25012 (默认)</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 管理路径: {AdminPath} (动态混淆)</text>
    </g>

    <g transform='translate(10, 130)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【兼容旧版 Agent】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 支持传统 HTTP Ingest 链路</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 自动补发并持久化节点专属 Token</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 探测 X-CM-AGENT-CAPABILITIES 头</text>
    </g>

    <g transform='translate(10, 230)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【更新机制】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• Server/Agent 均支持一键远程升级</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• Docker 模式需挂载 /var/run/docker.sock</text>
      <text x='5' y='69' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 自动校验 GitHub Release Checksums</text>
    </g>

    <g transform='translate(10, 330)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='13' font-weight='bold' fill='#2D3748'>【AI 助手上下文】</text>
      <text x='5' y='35' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 构建包含指标、趋势、错误的 Prompt</text>
      <text x='5' y='52' font-family='PingFang SC' font-size='11' fill='#4A5568'>• 整合 Store + test_history 形成事实库</text>
    </g>
    
    <g transform='translate(10, 420)'>
      <text x='0' y='15' font-family='PingFang SC' font-size='12' font-weight='bold' fill='#718096'>图例说明:</text>
      <line x1='5' y1='30' x2='40' y2='30' stroke='#3182CE' stroke-width='2' /> <text x='45' y='35' font-family='PingFang SC' font-size='10' fill='#4A5568'>主链路</text>
      <line x1='5' y1='50' x2='40' y2='50' stroke='#A0AEC0' stroke-width='2' stroke-dasharray='4,2' /> <text x='45' y='55' font-family='PingFang SC' font-size='10' fill='#4A5568'>备用/回退链路</text>
    </g>
  </g>

  <!-- ================= 连线 (Connections) ================= -->
  <!-- Browser to Server -->
  <path d='M 310 140 L 400 140' fill='none' stroke='#E53E3E' stroke-width='1.5' marker-end='url(#arrow)' />
  <text x='355' y='135' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#E53E3E'>HTTP/WS</text>
  
  <path d='M 310 280 L 400 280' fill='none' stroke='#E53E3E' stroke-width='1.5' marker-end='url(#arrow)' />
  <text x='355' y='275' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#E53E3E'>Admin API</text>

  <!-- Agent to Server -->
  <path d='M 880 180 L 800 180' fill='none' stroke='#3182CE' stroke-width='2' marker-end='url(#arrow)' />
  <text x='840' y='175' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#2B6CB0'>gRPC</text>
  
  <path d='M 880 310 L 840 310 L 840 120 L 800 120' fill='none' stroke='#A0AEC0' stroke-width='1' stroke-dasharray='4,2' marker-end='url(#arrow)' />
  <text x='840' y='115' font-family='PingFang SC' font-size='10' text-anchor='middle' fill='#718096'>HTTP Fallback</text>

  <!-- Server to External -->
  <path d='M 600 620 L 600 640 L 840 640 L 840 520 L 880 520' fill='none' stroke='#718096' stroke-width='1' stroke-dasharray='3,3' marker-end='url(#arrow)' />
  
  <!-- Server to Persistence -->
  <path d='M 600 760 L 600 780' fill='none' stroke='#38A169' stroke-width='2' marker-end='url(#arrow)' />

</svg>